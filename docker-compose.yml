version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: Baazar_Container
    volumes:
      - ./:/var/www/html
    ports:
      - "8002:8002"
    depends_on:
      - db
      - redis
      - mongo
    command: php artisan serve --host=0.0.0.0 --port=8002

  db:
    image: postgres:14
    container_name: Baazar_BD
    environment:
      POSTGRES_DB: baazar
      POSTGRES_USER: pernalonga
      POSTGRES_PASSWORD: pernalonga
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: Baazar_Redis
    ports:
      - "6379:6379"
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redisdata:/data

  mongo:
    image: mongo:7
    container_name: Baazar_Mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: patolino
      MONGO_INITDB_ROOT_PASSWORD: patolino
      MONGO_INITDB_DATABASE: baazar
    ports:
      - "27017:27017"
    volumes:
      - mongodata:/data/db

volumes:
  pgdata:
  redisdata:
  mongodata:
